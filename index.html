<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AU Studnet Working Hour Calculator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="main-container">
        <header class="header">
            <h1>AU international Student Hour Calculator</h1>
            <p>Calculator for all the international student</p>
        </header>
        <section class="section one">
            <div class="input-container">
                <h1>Add New Shift</h1>
                <div class="input-fields">
                    <form class="input-form" id="userForm">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" name="date" id="date" class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="start-time">Start Time
                            </label>
                            <input type="time" name="startTime" id="start-time" class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="end-time">End Time</label>
                            <input type="time" name="endTime" id="end-time" class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="break">Break (min)</label>
                            <input type="number" name="break" id="break" class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="workplace">Workplace</label>
                            <input type="text" name="workPlace" id="workplace" class="form-input">
                        </div>
                    </form>
                    <button class="add-btn">+ Add Shift</button>
                </div>
            </div>
        </section>
        <section class="section two">
            <div class="display-container">
                <h1>This Week's Schedule</h1>
                <div class="cards">

                    <div class="card" id="sunday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Sunday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">
                        </div>
                    </div>

                    <div class="card" id="monday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Monday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container no-shift">

                        </div>
                    </div>

                    <div class="card" id="tuesday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Tuesday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">

                        </div>
                    </div>

                    <div class="card" id="wednesday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Wednesday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">

                        </div>
                    </div>

                    <div class="card" id="thursday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Thursday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">
                        </div>
                    </div>

                    <div class="card" id="friday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Friday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">
                        </div>
                    </div>

                    <div class="card" id="saturday">
                        <div class="day-container">
                            <div class="date-container">
                                <h2>Saturday</h2>
                            </div>
                            <div class="hour-container"></div>
                        </div>
                        <div class="shift-container">
                        </div>
                    </div>


                </div>
                <button class="prev-btn">
                    <img src="/assets/icons/arrow-prev-svgrepo-com.svg" alt=""> </button>
                <button class="next-btn"><img src="/assets/icons/next-svgrepo-com.svg" alt=""></button>
            </div>
        </section>
        <section class="section three">
            <div class="output-container">
                <h1>Summary</h1>
                <div class="output-cards"></div>
            </div>
        </section>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>

</html>
